openapi: 3.0.3
info:
  title: Users API
  description: API for managing users
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: Local server
tags:
  - name: Users
    description: Operations related to users
paths:
  /api/v1/users:
    get:
      tags:
        - Users
      summary: Get all users
      operationId: getAllUsers
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/email'
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/PaginatedResult'
    post:
      tags:
        - Users
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
        '409':
          description: User already exists
        '500':
          description: Internal server error
  /api/v1/users/{userId}:
    get:
      tags:
        - Users
      summary: Get a user by ID
      operationId: getUserById
      parameters:
        - name: userId
          in: path
          required: true
          description: ID of the user to retrieve
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
        '404':
          description: User not found
        '500':
          description: Internal server error
    put:
      tags:
        - Users
      summary: Update a user by ID
      operationId: updateUserById
      parameters:
        - name: userId
          in: path
          required: true
          description: ID of the user to update
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
        '404':
          description: User not found
        '500':
          description: Internal server error
    delete:
      tags:
        - Users
      summary: Delete a user by ID
      operationId: deleteUserById
      parameters:
        - name: userId
          in: path
          required: true
          description: ID of the user to delete
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: User deleted successfully
        '400':
          description: Invalid request
        '404':
          description: User not found
        '500':
          description: Internal server error

components:
  parameters:
    page:
      name: page
      in: query
      description: Page number
      required: false
      schema:
        type: integer
        default: 0
    size:
      name: size
      in: query
      description: Page size
      required: false
      schema:
        type: integer
        default: 10
    sort:
      name: sort
      in: query
      description: Sort order (e.g., 'name,asc')
      required: false
      schema:
        default: 'id,asc'
        type: string
    name:
      name: name
      in: query
      description: Filter by user name
      required: false
      schema:
        type: string
    email:
      name: email
      in: query
      description: Filter by user email
      required: false
      schema:
        type: string
        format: email
  schemas:
    PaginatedResult:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/User'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        page:
          type: integer
    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
      required:
        - name
        - email
    CreateUserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
      required:
        - name
        - email
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email